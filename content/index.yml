  title: 让我们一起把 [全屋设计出海]{.text-primary} 做成长期品牌
  description: 如果你在寻找设计、供应链与全球交付一体化能力，欢迎与佛山市绎间科技有限公司联系，开启项目评估与合作对接。
  links:
    - label: 立即咨询
      to: 'mailto:info@yijianspace.com'
